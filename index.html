<style>
body{
  font-family: Arial, sans-serif;
  padding:40px;
}

/* LONGER SWITCH */
.drag-switch{
  position: relative;
  width: 220px;
  height: 70px;
  background: #2c2c2c;
  border-radius: 50px;
  overflow: hidden;
  user-select: none;
}

/* TRACK */
.track{
  position:absolute;
  inset:0;
  border-radius:50px;
  background: linear-gradient(to right,#444,#333);
}

/* DRAG HANDLE */
.handle{
  position:absolute;
  width:60px;
  height:60px;
  left:5px;
  top:5px;
  border-radius:100%;
  background:white;
  cursor:grab;
  transition:
    left 0.50s ease-out,
    transform 0.15s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.4);
}

/* Slight stretch while dragging */
.handle.dragging{
  transform: scale(1.09);
  cursor:grabbing;
}

/* Text */
.label{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:45px;
  pointer-events:none;
  color: grey;
}




.wrapper {
    display:flex;
    justify-content:center;
    align-items:center;
    height:15vh;
}
</style>


<script>
function runCode(){
  alert("Math Work Loading!");
}

const handle = document.getElementById("handle");
const slider = document.getElementById("switch");

let dragging = false;
let startX = 0;
let currentX = 5;

const maxX = 155; // distance handle can move

handle.addEventListener("mousedown", startDrag);
document.addEventListener("mousemove", drag);
document.addEventListener("mouseup", stopDrag);

handle.addEventListener("touchstart", startDrag);
document.addEventListener("touchmove", drag);
document.addEventListener("touchend", stopDrag);

function startDrag(e){
  dragging = true;
  handle.classList.add("dragging");

  startX = getX(e) - currentX;
}
function drag(e){
  if(!dragging) return;

  e.preventDefault();

  let x = getX(e) - startX;

  const minX = 5;
  const maxX = 155; // track width - handle width - padding

  // RESISTANCE BEYOND EDGE (optional feel)
  if (x > maxX) {
    x = maxX + (x - maxX) * 0.2;
  }

  // HARD CLAMP so it never visually escapes
  x = Math.max(minX, Math.min(x, maxX));

  currentX = x;
  handle.style.left = x + "px";
}


function stopDrag(){
  if(!dragging) return;

  dragging = false;
  handle.classList.remove("dragging");

  /* TRIGGER if dragged far enough */
  if(currentX >= 130){

    /* Animate to end */
    handle.style.left = maxX + "px";

    setTimeout(() => {

      /* Trigger JS */
      document.getElementById("opt1").click();

      /* RESET BACK */
      handle.style.transition = "left 0.5s ease";
      handle.style.left = "5px";

      currentX = 5;

    }, 150);

  } else {

    /* Snap back if not far enough */
    handle.style.left = "5px";
    currentX = 5;
  }
}

function getX(e){
  return e.touches ? e.touches[0].clientX : e.clientX;
}
</script>
